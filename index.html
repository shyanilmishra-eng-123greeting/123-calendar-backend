<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Modern Heirloom | Global Event Calendar</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Font Awesome for Social -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ["Inter", "sans-serif"],
                        headline: ["Plus Jakarta Sans", "sans-serif"],
                    },
                    colors: {
                        heirloom: {
                            burgundy: '#6B0001',
                            green: '#2D4A2D',
                            cream: '#FEF9ED',
                            slate: '#F1F5F9'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #FEF9ED; color: #1a1a1a; overflow-x: hidden; }
        .heirloom-tile { 
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .heirloom-tile:hover { 
            transform: scale(1.02) translateY(-2px);
            z-index: 50;
        }
        .bg-pattern {
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0l20 20L40 0H0z' fill='%23ffffff' fill-opacity='0.1' fill-rule='evenodd'/%3E%3C/svg%3E");
        }
    </style>
</head>
<body class="p-2 sm:p-6 lg:p-8 min-h-screen font-sans">

    <!-- Balanced Nav Header -->
    <header class="max-w-7xl mx-auto flex justify-between items-center mb-6 sm:mb-16 px-2 sm:px-4">
        <a href="#" class="text-[10px] sm:text-[13px] font-black text-heirloom-burgundy uppercase tracking-[0.15em] sm:tracking-[0.2em] hover:opacity-70 transition-opacity hidden xs:block">Memories</a>
        
        <a href="#" class="transition-transform active:scale-95">
            <img src="LOGO.png" alt="Logo" class="h-8 sm:h-14 object-contain">
        </a>
        
        <a href="#" class="text-[10px] sm:text-[13px] font-black text-heirloom-burgundy uppercase tracking-[0.15em] sm:tracking-[0.2em] hover:opacity-70 transition-opacity hidden xs:block">Reminders</a>
    </header>

    <main class="max-w-[1700px] mx-auto overflow-hidden">
        <div class="flex flex-col lg:flex-row gap-6 sm:gap-16 items-start">
            
            <!-- Shrunken Left Section (Responsive Sidebar) -->
            <div class="w-full lg:w-[22%] shrink-0">
                <div class="bg-white/50 backdrop-blur-sm rounded-[24px] sm:rounded-[32px] p-5 sm:p-8 border border-heirloom-burgundy/5 mb-6 sm:mb-8">
                    <h1 class="text-2xl sm:text-4xl font-extrabold text-[#1a1a1a] leading-tight tracking-tighter mb-2 sm:mb-4 font-headline uppercase">
                        Celebrate<br class="hidden sm:block"> Every Moment
                    </h1>
                    <p class="text-stone-400 font-medium text-[10px] sm:text-xs leading-relaxed uppercase tracking-widest leading-loose">
                        A curated heirloom of world milestones and circle anniversaries.
                    </p>
                </div>

                <!-- Featured Card (Mobile Optimized) -->
                <div class="bg-white rounded-[24px] sm:rounded-[32px] p-5 sm:p-8 shadow-xl border border-heirloom-burgundy/5 text-left transition-all hover:shadow-2xl active:scale-[0.98] hidden sm:block md:block lg:block">
                    <div class="flex justify-between items-center mb-6">
                        <div class="bg-heirloom-burgundy text-white p-2.5 rounded-xl">
                            <i class="fa-solid fa-cake-candles text-sm"></i>
                        </div>
                        <span class="text-heirloom-burgundy/40 font-black text-[9px] uppercase tracking-widest leading-none">Tomorrow</span>
                    </div>
                    <h3 class="text-xl font-black mb-1 font-headline tracking-tighter">Emma's 25th</h3>
                    <p class="text-stone-400 text-[11px] font-bold mb-6">3 members preparing wishes.</p>
                    <button id="featured-draft-btn" class="w-full py-3.5 bg-heirloom-burgundy text-white rounded-2xl font-black text-[11px] uppercase tracking-widest shadow-lg hover:bg-black transition-all transform active:scale-95">
                        Draft Now
                    </button>
                </div>
            </div>

            <!-- Expanded Right Calendar Section (BIG & RESPONSIVE) -->
            <div class="w-full lg:w-[78%]">
                <div class="bg-white rounded-[24px] sm:rounded-[40px] p-3 sm:p-8 lg:p-12 shadow-2xl border border-heirloom-burgundy/10">
                    <!-- Month Header -->
                    <div class="flex justify-between items-center mb-4 sm:mb-10 pb-4 sm:pb-8 border-b border-stone-50">
                        <h2 id="month-display" class="text-2xl sm:text-5xl font-black font-headline text-heirloom-burgundy tracking-tighter shrink-0">April 2026</h2>
                        <div class="flex items-center gap-2 sm:gap-6">
                            <div class="flex gap-1 sm:gap-2">
                                <button id="prev-month" class="w-8 h-8 sm:w-12 sm:h-12 rounded-lg sm:rounded-2xl bg-heirloom-burgundy/5 text-heirloom-burgundy flex items-center justify-center hover:bg-heirloom-burgundy hover:text-white transition-all">
                                    <i class="fa-solid fa-chevron-left text-[10px] sm:text-sm"></i>
                                </button>
                                <button id="next-month" class="w-8 h-8 sm:w-12 sm:h-12 rounded-lg sm:rounded-2xl bg-heirloom-burgundy/5 text-heirloom-burgundy flex items-center justify-center hover:bg-heirloom-burgundy hover:text-white transition-all">
                                    <i class="fa-solid fa-chevron-right text-[10px] sm:text-sm"></i>
                                </button>
                            </div>
                            <button id="today-btn" class="px-3 sm:px-6 h-8 sm:h-12 rounded-lg sm:rounded-2xl border-2 border-heirloom-burgundy/10 font-black text-[9px] sm:text-[11px] text-heirloom-burgundy uppercase tracking-widest sm:tracking-[0.2em] hover:bg-heirloom-burgundy hover:text-white transition-all">Today</button>
                        </div>
                    </div>

                    <!-- Weekday Headers -->
                    <div class="grid grid-cols-7 mb-2 sm:mb-6 opacity-30 text-center">
                        <div class="font-black text-[8px] sm:text-[11px] uppercase tracking-widest">S</div>
                        <div class="font-black text-[8px] sm:text-[11px] uppercase tracking-widest">M</div>
                        <div class="font-black text-[8px] sm:text-[11px] uppercase tracking-widest">T</div>
                        <div class="font-black text-[8px] sm:text-[11px] uppercase tracking-widest">W</div>
                        <div class="font-black text-[8px] sm:text-[11px] uppercase tracking-widest">T</div>
                        <div class="font-black text-[8px] sm:text-[11px] uppercase tracking-widest">F</div>
                        <div class="font-black text-[8px] sm:text-[11px] uppercase tracking-widest">S</div>
                    </div>

                    <div id="calendar-grid" class="grid grid-cols-7 gap-1.5 sm:gap-5 mb-12">
                        <!-- Tiles injected by JS -->
                    </div>

                    <!-- New: Detailed Event List Section -->
                    <div id="upcoming-events-section" class="pt-10 border-t border-stone-50">
                        <div class="flex justify-between items-center mb-8">
                            <h3 class="text-xl md:text-2xl font-black font-headline text-heirloom-burgundy tracking-tight uppercase">Upcoming Occasions</h3>
                            <div class="h-1 flex-grow mx-8 bg-heirloom-burgundy/5 rounded-full hidden sm:block"></div>
                        </div>
                        <div id="upcoming-events-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <!-- Event cards injected by JS -->
                        </div>
                    </div>
                </div>

                <!-- Footer Social (Minimal) -->
                <div class="flex justify-center lg:justify-end gap-6 mt-12 text-heirloom-burgundy/20">
                    <a href="#" class="hover:text-heirloom-burgundy transition-all text-sm"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" class="hover:text-heirloom-burgundy transition-all text-sm"><i class="fab fa-twitter"></i></a>
                    <a href="#" class="hover:text-heirloom-burgundy transition-all text-sm"><i class="fab fa-instagram"></i></a>
                    <a href="#" class="hover:text-heirloom-burgundy transition-all text-sm"><i class="fab fa-linkedin-in"></i></a>
                </div>
            </div>
        </div>
    </main>

    <!-- Global Modal Shell -->
    <div id="event-modal-backdrop" class="fixed inset-0 bg-heirloom-burgundy/40 backdrop-blur-md z-[100] flex items-center justify-center opacity-0 pointer-events-none transition-all duration-300 p-4">
        <div id="event-modal" class="bg-white w-full max-w-lg rounded-[48px] shadow-2xl overflow-hidden transform scale-95 opacity-0 transition-all duration-300 border-8 border-white">
            <div class="p-8 md:p-12 text-center">
                <div id="modal-date" class="bg-heirloom-burgundy/5 inline-block px-4 py-2 rounded-xl text-heirloom-burgundy font-black text-[10px] uppercase tracking-widest mb-6">April 03, 2026</div>
                <h2 id="modal-title" class="text-3xl md:text-4xl font-black mb-8 font-headline leading-tight tracking-tighter">Celebrate Occasion</h2>
                <div id="modal-body" class="space-y-6">
                    <!-- AI Content will be injected here -->
                </div>
            </div>
        </div>
    </div>

    <script src="calendar-app.js"></script>
</body>
</html>
