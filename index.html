<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Calendar | Event Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ["Inter", "sans-serif"],
                        headline: ["Plus Jakarta Sans", "sans-serif"],
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --wa: #25d366;
            --wa-soft: #dcfce7;
            --pin: #f59e0b;
            --pin-soft: #fef3c7;
        }

        body {
            background: #f4f4f5;
            color: #18181b;
            overflow-x: hidden;
        }

        .cal-tile {
            background: #fff;
            border: 1px solid #e4e4e7;
            border-radius: 14px;
            transition: box-shadow 0.15s, transform 0.15s;
            position: relative;
            cursor: pointer;
            min-height: 11rem;
        }

        .cal-tile:hover {
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.10);
            transform: translateY(-1px);
            z-index: 10;
        }

        .cal-tile.is-today {
            border: 2px solid #6366f1;
            background: #eef2ff;
        }

        .cal-tile.has-event {
            background: #fafafa;
        }

        .cal-tile.empty {
            visibility: hidden;
            pointer-events: none;
        }

        .day-number {
            position: sticky;
            top: 0;
            z-index: 2;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 2rem;
            height: 2rem;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(10px);
            box-shadow: 0 1px 2px rgba(24, 24, 27, 0.08);
        }

        .tile-items {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: 0.75rem;
            margin-bottom: 3rem;
        }

        .tile-item {
            border: 1px solid #e4e4e7;
            border-radius: 14px;
            background: #ffffff;
            padding: 0.7rem 0.8rem;
        }

        .tile-item.candle-card {
            background:
                radial-gradient(circle at top, rgba(251, 191, 36, 0.35), transparent 45%),
                linear-gradient(135deg, #fff7ed, #ffffff 65%);
            border-color: #fdba74;
            box-shadow: inset 0 0 0 1px rgba(251, 191, 36, 0.15);
        }

        .tile-actions {
            display: flex;
            gap: 6px;
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            justify-content: space-between;
        }

        .tile-action-btn {
            min-width: 44px;
            height: 38px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 0 12px;
            font-size: 12px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: background 0.1s;
        }

        .btn-reminder {
            background: var(--wa-soft);
            color: #15803d;
        }

        .btn-reminder:hover {
            background: #bbf7d0;
        }

        .btn-greeting {
            background: var(--pin-soft);
            color: #b45309;
        }

        .btn-greeting:hover {
            background: #fde68a;
        }

        .action-label {
            font-size: 10px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .candle-enhanced {
            background: linear-gradient(135deg, #fbbf24, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.65rem !important;
            filter: drop-shadow(0 3px 8px rgba(239, 68, 68, 0.35));
        }

        #event-modal {
            max-height: 85vh;
            display: flex;
            flex-direction: column;
        }

        #modal-body {
            overflow-y: auto;
            scrollbar-width: thin;
        }

        .weekend-column {
            background: linear-gradient(180deg, rgba(244, 244, 245, 0.8), rgba(255, 255, 255, 0));
            border-radius: 18px;
        }

        .sticky-legend {
            position: sticky;
            top: 0;
            z-index: 20;
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(10px);
        }

        @media (min-width: 640px) {
            .cal-tile {
                min-height: 12.5rem;
            }

            .tile-actions {
                justify-content: flex-start;
            }
        }
    </style>
</head>

<body class="p-4 sm:p-6 lg:p-8 min-h-screen font-sans">

    <header class="max-w-[1600px] mx-auto flex justify-between items-center mb-6 px-2">
        <a href="#" class="transition-transform active:scale-95">
            <img src="LOGO.png" alt="Logo" class="h-8 sm:h-10 object-contain opacity-80">
        </a>
        <div class="flex items-center gap-2">
            <button id="profile-btn"
                class="px-4 py-2 rounded-full border border-zinc-200 bg-white font-bold text-[10px] uppercase tracking-widest hover:bg-zinc-100 transition-all">Profile</button>
            <button id="today-btn"
                class="px-5 py-2 rounded-full border border-zinc-200 bg-white font-bold text-[10px] uppercase tracking-widest hover:bg-zinc-900 hover:text-white transition-all">Today</button>
        </div>
    </header>

    <main class="max-w-[1600px] mx-auto">
        <div class="bg-white rounded-3xl shadow-sm border border-zinc-100 overflow-hidden">

            <div
                class="p-6 sm:p-10 border-b border-zinc-100 flex flex-col sm:flex-row justify-between items-center gap-4">
                <h2 id="month-display"
                    class="text-3xl sm:text-5xl font-black font-headline tracking-tighter text-zinc-900">April 2026</h2>
                <div class="flex bg-zinc-100 p-1 rounded-full">
                    <button id="prev-month"
                        class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-white transition-all text-zinc-600">
                        <i class="fa-solid fa-chevron-left text-xs"></i>
                    </button>
                    <button id="next-month"
                        class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-white transition-all text-zinc-600">
                        <i class="fa-solid fa-chevron-right text-xs"></i>
                    </button>
                </div>
            </div>

            <div class="p-4 sm:p-8">
                <div class="sticky-legend hidden sm:grid grid-cols-7 mb-4 text-center">
                    <div class="font-bold text-[10px] text-zinc-400 uppercase tracking-widest py-3">Sun</div>
                    <div class="font-bold text-[10px] text-zinc-400 uppercase tracking-widest py-3">Mon</div>
                    <div class="font-bold text-[10px] text-zinc-400 uppercase tracking-widest py-3">Tue</div>
                    <div class="font-bold text-[10px] text-zinc-400 uppercase tracking-widest py-3">Wed</div>
                    <div class="font-bold text-[10px] text-zinc-400 uppercase tracking-widest py-3">Thu</div>
                    <div class="font-bold text-[10px] text-zinc-400 uppercase tracking-widest py-3">Fri</div>
                    <div class="font-bold text-[10px] text-zinc-400 uppercase tracking-widest py-3">Sat</div>
                </div>

                <div id="calendar-grid"
                    class="grid grid-cols-2 sm:grid-cols-7 gap-3 sm:gap-4 min-h-[500px] auto-rows-fr"></div>

                <div class="mt-12 pt-8 border-t border-zinc-100">
                    <h3 class="text-sm font-black font-headline uppercase tracking-widest text-zinc-400 mb-6">Coming Up</h3>
                    <div id="upcoming-events-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div id="event-modal-backdrop"
        class="fixed inset-0 bg-black/40 backdrop-blur-sm z-[100] flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-200 p-4">
        <div id="event-modal"
            class="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden transform scale-95 opacity-0 transition-all duration-200">
            <div class="p-8 md:p-10">
                <div id="modal-date"
                    class="bg-zinc-100 inline-block px-4 py-1.5 rounded-full text-zinc-500 font-bold text-[10px] uppercase tracking-widest mb-5">
                    Date</div>
                <h2 id="modal-title"
                    class="text-2xl md:text-3xl font-black mb-6 font-headline leading-tight tracking-tight text-zinc-900">
                    Event</h2>
                <div id="modal-mode" class="text-xs font-bold uppercase tracking-widest text-indigo-500 mb-4"></div>
                <div id="modal-body" class="text-sm text-zinc-600 leading-relaxed max-h-[40vh]"></div>
                <button id="modal-close-btn"
                    class="mt-6 w-full py-4 bg-zinc-900 text-white rounded-2xl font-bold text-[11px] uppercase tracking-widest hover:opacity-80 transition-all">Close</button>
            </div>
        </div>
    </div>

    <script src="config.local.js"></script>
    <script src="calendar-app.js"></script>
</body>

</html>
